
  <!-- Filters -->
  <div class="bg-white rounded-xl border border-gray-200 p-5 mb-6 flex gap-4 items-end">
    <div>
      <label class="block text-xs text-gray-500 mb-1 uppercase tracking-wide">Service</label>
      <select
        class="border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-red-300"
        [(ngModel)]="selectedService"
      >
        <option value="" disabled selected>Select Service</option>
        @for(service of services; track service) {
          <option [value]="service">{{ service }}</option>
        }
      </select>
    </div>
    <div>
      <label class="block text-xs text-gray-500 mb-1 uppercase tracking-wide">Select Duration</label>
      <select class="border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-red-300" [(ngModel)]="selectedDuration" aria-placeholder="Duration">
        <option value="" disabled selected>Select Duration</option>
        <option *ngFor="let duration of dateRange" [value]="duration.value">{{ duration.label }}</option>
      </select>
    </div>

    <button
      class="bg-red-500 hover:bg-red-600 disabled:bg-gray-300 disabled:cursor-not-allowed text-white text-sm font-medium px-5 py-2 rounded-lg transition"
      [disabled]="!selectedService || !selectedDuration"
      (click)="search()"
    >
      Analyse
    </button>
  </div>
